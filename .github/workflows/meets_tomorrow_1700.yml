name: Qeepe Meets — Tomorrow 17:00

on:
  schedule:
    # 17:00 Asia/Almaty = 12:00 UTC
    - cron: "0 12 * * *"
  workflow_dispatch: {}

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Write credentials.json
        env:
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
        run: |
          python - << 'PY'
          import os, json
          s = os.environ.get("GOOGLE_CREDENTIALS_JSON", "")
          if not s:
            raise SystemExit("Missing secret: GOOGLE_CREDENTIALS_JSON")
          data = json.loads(s)
          with open("credentials.json", "w", encoding="utf-8") as f:
            json.dump(data, f, ensure_ascii=False, indent=2)
          print("credentials.json written")
          PY

      - name: Run tomorrow report
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_FORUM_CHAT_ID: ${{ secrets.TELEGRAM_FORUM_CHAT_ID }}
          TELEGRAM_MEETS_THREAD_ID: ${{ secrets.TELEGRAM_MEETS_THREAD_ID }}
          GOOGLE_CALENDAR_ID: ${{ secrets.GOOGLE_CALENDAR_ID }}
          TZ: ${{ secrets.TZ }}
        run: |
          python scripts/run_daily.py --tomorrow
